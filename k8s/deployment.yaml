apiVersion: apps/v1
kind: Deployment
metadata:
  name: tobira
  namespace: tobira
  labels:
    app.kubernetes.io/name: tobira
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tobira
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tobira
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: tobira
          image: tobira:0.2.0
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: TOBIRA_BACKEND
              value: "fasttext"
            - name: TOBIRA_MODEL_PATH
              value: "/models/fasttext-spam.bin"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /etc/tobira
              readOnly: true
            - name: models
              mountPath: /models
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: tobira
        - name: models
          persistentVolumeClaim:
            claimName: tobira-models
        - name: tmp
          emptyDir: {}
