[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tobira"
version = "0.0.1"
description = "tobira - gateway toolkit"
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
dependencies = [
    "fasttext-wheel>=0.9.2",
]

[project.optional-dependencies]
bert = [
    "torch>=2.0",
    "transformers>=4.30",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
]

[project.urls]
Repository = "https://github.com/piroz/tobira"
