[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tobira"
version = "0.0.1"
description = "tobira - gateway toolkit"
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
dependencies = []

[project.optional-dependencies]
fasttext = [
    "fasttext-wheel>=0.9.2",
]
bert = [
    "torch>=2.0",
    "transformers>=4.30",
]
serving = [
    "fastapi>=0.100",
    "uvicorn>=0.20",
    "pydantic>=2.0",
    "tomli>=2.0; python_version < '3.11'",
]
evaluation = [
    "matplotlib>=3.5",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "httpx>=0.24",
    "tobira[fasttext,bert,serving,evaluation]",
]

[project.urls]
Repository = "https://github.com/piroz/tobira"
