# tobira-milter configuration
# Copy to /etc/tobira/milter.conf and adjust settings.

[milter]
# tobira API server URL
api_url = http://127.0.0.1:8000

# Socket to listen on.
# UNIX socket (recommended):
socket = unix:/var/run/tobira/milter.sock
# TCP socket (alternative):
# socket = inet:9900@127.0.0.1

# Connection timeout to tobira API (seconds)
timeout = 10

# Action when API is unavailable: accept or tempfail
fail_action = accept

# Score thresholds and actions
# Reject mail if spam score >= this value (0 to disable rejection)
reject_threshold = 0.9

# Add X-Tobira-Score and X-Tobira-Label headers
add_headers = true
