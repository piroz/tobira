# tobira rspamd plugin configuration
#
# Copy this file to /etc/rspamd/local.d/tobira.conf
# Copy tobira.lua to /etc/rspamd/plugins.d/tobira.lua
#
# Then reload rspamd:
#   rspamadm configtest && systemctl reload rspamd

# tobira API server URL
api_url = "http://127.0.0.1:8000";

# HTTP request timeout in seconds
timeout = 2.0;

# Fail-open: when true, mail is passed through on API errors
fail_open = true;

# Maximum text bytes sent to the API (truncated if exceeded)
max_text_bytes = 65536;

# Symbol definitions and score thresholds
# Scores in the range [0.3, 0.5) are intentionally unclassified (uncertain)
symbols {
  spam_high {
    name = "TOBIRA_SPAM_HIGH";
    weight = 8.0;
    threshold = 0.9;
  }
  spam_med {
    name = "TOBIRA_SPAM_MED";
    weight = 5.0;
    threshold = 0.7;
  }
  spam_low {
    name = "TOBIRA_SPAM_LOW";
    weight = 2.0;
    threshold = 0.5;
  }
  ham {
    name = "TOBIRA_HAM";
    weight = -3.0;
    threshold = 0.3;
  }
  fail {
    name = "TOBIRA_FAIL";
    weight = 0.0;
  }
}
