apiVersion: apps/v1
kind: Deployment
metadata:
  name: tobira-api
  labels:
    app: tobira
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tobira
      component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: tobira
        component: api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: tobira-api
          image: tobira-api:latest
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
