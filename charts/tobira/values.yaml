# Default values for tobira Helm chart.

replicaCount: 1

image:
  repository: tobira
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: tobira.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Liveness and readiness probes using /health endpoint.
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# tobira backend configuration.
backend:
  # Backend type: fasttext, bert, onnx, ollama, llm_api, ensemble, two_stage
  type: fasttext
  # Path to model file inside the container (mounted via PVC).
  modelPath: /models/fasttext-spam.bin
  # Extra backend config passed as JSON in TOBIRA_BACKEND_CONFIG env var.
  config: {}

# Persistent volume claim for model storage.
persistence:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 5Gi
  # Use an existing PVC instead of creating a new one.
  existingClaim: ""

# Additional environment variables.
env: []

# ConfigMap data merged into tobira.toml.
configOverrides: {}

# Node scheduling constraints.
nodeSelector: {}
tolerations: []
affinity: {}

# -- GPU scheduling (uncomment to enable):
