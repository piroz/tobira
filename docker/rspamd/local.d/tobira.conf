enabled = true;
api_url = "http://tobira-api:8000";
timeout = 2.0;
fail_open = true;
max_text_bytes = 65536;

symbols {
  spam_high {
    name = "TOBIRA_SPAM_HIGH";
    weight = 8.0;
    threshold = 0.9;
  }
  spam_med {
    name = "TOBIRA_SPAM_MED";
    weight = 5.0;
    threshold = 0.7;
  }
  spam_low {
    name = "TOBIRA_SPAM_LOW";
    weight = 2.0;
    threshold = 0.5;
  }
  ham {
    name = "TOBIRA_HAM";
    weight = -3.0;
    threshold = 0.3;
  }
  fail {
    name = "TOBIRA_FAIL";
    weight = 0.0;
  }
}
