events {
    worker_connections 1024;
}

http {
    upstream tobira_backend {
        # Round-robin load balancing across API instances.
        # No session affinity needed — tobira is stateless.
        server tobira-api-1:8000 max_fails=3 fail_timeout=10s;
        server tobira-api-2:8000 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 8000;

        location / {
            proxy_pass http://tobira_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Timeouts aligned with tobira API response times
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;

            # Retry on connection failure (next upstream server)
            proxy_next_upstream error timeout http_503;
            proxy_next_upstream_tries 2;
        }

        # Health check endpoint for the load balancer itself
        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
