name: Python CI

on:
  pull_request:
    branches: [main]
    paths:
      - "python/**"
      - ".github/workflows/python.yml"

concurrency:
  group: python-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          src: python

  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv run mypy tobira/

  test:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
        numpy-version: ["numpy<2", "numpy>=2"]
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libmilter-dev
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install with NumPy constraint
        run: uv sync --python ${{ matrix.python-version }} --all-extras
      - name: Override NumPy version
        run: uv pip install '${{ matrix.numpy-version }}'
      - name: Run tests
        run: uv run pytest
