name: JS CI

on:
  pull_request:
    branches: [main]
    paths:
      - "js/**"
      - "integrations/haraka/**"
      - ".github/workflows/js.yml"

concurrency:
  group: js-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            js/package-lock.json
            integrations/haraka/package-lock.json
      - name: Install and lint SDK
        working-directory: js
        run: |
          npm ci
          npm run lint
      - name: Install and lint Haraka
        working-directory: integrations/haraka
        run: |
          npm ci
          npm run lint

  test-sdk:
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: js
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: js/package-lock.json
      - run: npm test

  test-haraka:
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integrations/haraka
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: integrations/haraka/package-lock.json
      - run: npm ci
      - run: npm test
